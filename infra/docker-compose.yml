services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: dira-postgis-pgvector:16-3.4
    container_name: dira-db
    environment:
      POSTGRES_USER: dira
      POSTGRES_PASSWORD: dira
      POSTGRES_DB: dira
    ports:
      - "5432:5432"
    volumes:
      - dira_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dira -d dira"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: enable pgvector after first boot if the image lacks it.
  # Prefer pgvector/pgvector:pg16 + PostGIS extension, or install vector in init.
  # For local demo, use the migration that CREATE EXTENSION vector;

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dira:dira@db:5432/dira
      DATA_MODE: seeded
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  worker-pipeline:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: ["python", "-m", "dira_worker.pipeline", "--cycle", "2026-03-11"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dira:dira@db:5432/dira
      DATA_MODE: seeded
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  worker-dispatch:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: ["python", "-m", "dira_worker.dispatch"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dira:dira@db:5432/dira
      DATA_MODE: seeded
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

volumes:
  dira_pgdata:
