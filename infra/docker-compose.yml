services:
  db:
    # PostGIS 16 + pgvector baked at build time (Dockerfile.db).
    # On constrained VMs, use local PostgreSQL 16 + postgis + pgvector instead
    # (see DEVIATIONS.md D-008). Schema is applied via Alembic, not init scripts.
    build:
      context: .
      dockerfile: Dockerfile.db
    image: dira-db:local
    container_name: dira-db
    environment:
      POSTGRES_USER: dira
      POSTGRES_PASSWORD: dira
      POSTGRES_DB: dira
    ports:
      # Host 55432 avoids clashing with local Postgres installs on 5432–5434.
      - "55432:5432"
    volumes:
      - dira_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dira -d dira"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dira:dira@db:5432/dira
      DATA_MODE: seeded
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  worker-pipeline:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: ["python", "-m", "dira_worker.pipeline", "--cycle", "2026-03-11"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dira:dira@db:5432/dira
      DATA_MODE: seeded
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  worker-dispatch:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    command: ["python", "-m", "dira_worker.dispatch"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://dira:dira@db:5432/dira
      DATA_MODE: seeded
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        # The SPA calls the API from the *browser*, so this must be the
        # host-reachable URL of the api service, not the compose-internal name.
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api
    profiles:
      - full

volumes:
  dira_pgdata:
