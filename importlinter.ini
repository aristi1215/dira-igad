[importlinter]
root_packages =
    dira_core
    dira_features
    dira_data
    dira_ml
    dira_llm
    dira_dispatch
    dira_api
    dira_worker

[importlinter:contract:core-isolation]
name = dira_core is pure (no sibling packages)
type = forbidden
source_modules =
    dira_core
forbidden_modules =
    dira_features
    dira_data
    dira_ml
    dira_llm
    dira_dispatch
    dira_api
    dira_worker

[importlinter:contract:features-deps]
name = dira_features only depends on dira_core among project packages
type = forbidden
source_modules =
    dira_features
forbidden_modules =
    dira_data
    dira_ml
    dira_llm
    dira_dispatch
    dira_api
    dira_worker

[importlinter:contract:packages-no-apps]
name = packages never import apps
type = forbidden
source_modules =
    dira_core
    dira_features
    dira_data
    dira_ml
    dira_llm
    dira_dispatch
forbidden_modules =
    dira_api
    dira_worker
