[project]
name = "dira-features"
version = "0.1.0"
description = "Shared feature engineering for training and inference (prevents train/serve skew)."
requires-python = ">=3.11"
dependencies = [
  "dira-core",
  "numpy>=2.0",
  "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dira_features"]
