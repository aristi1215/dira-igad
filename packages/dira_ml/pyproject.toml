[project]
name = "dira-ml"
version = "0.1.0"
description = "Model training, evaluation, SHAP explanations, and artifact management."
requires-python = ">=3.11"
dependencies = [
  "dira-core",
  "dira-features",
  "lightgbm>=4.5",
  "scikit-learn>=1.5",
  "numpy>=2.0",
  "pandas>=2.2",
  "joblib>=1.4",
  "psycopg[binary]>=3.2",
]

[project.optional-dependencies]
explain = [
  "shap>=0.46",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dira_ml"]
