[project]
name = "dira-dispatch"
version = "0.1.0"
description = "Africa's Talking voice/SMS adapters, retries, webhooks, and TTS."
requires-python = ">=3.11"
dependencies = [
  "dira-core",
  "httpx>=0.28",
  "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dira_dispatch"]
