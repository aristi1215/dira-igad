[project]
name = "dira-data"
version = "0.1.0"
description = "Data adapters: ACLED, CHIRPS, MODIS/GEE, PostGIS repositories."
requires-python = ">=3.11"
dependencies = [
  "dira-core",
  "httpx>=0.28",
  "psycopg[binary,pool]>=3.2",
  "sqlalchemy>=2.0",
  "geoalchemy2>=0.15",
  "shapely>=2.0",
  "python-dateutil>=2.9",
]

[project.optional-dependencies]
rasters = [
  "rasterio>=1.4",
  "rasterstats>=0.21.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dira_data"]
