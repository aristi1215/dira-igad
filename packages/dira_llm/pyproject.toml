[project]
name = "dira-llm"
version = "0.1.0"
description = "LLM adapters, RAG (pgvector), prompts, and news signal extraction."
requires-python = ">=3.11"
dependencies = [
  "dira-core",
  "anthropic>=0.40",
  "openai>=1.50",
  "pydantic>=2.9",
  "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dira_llm"]
